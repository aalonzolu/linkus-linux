<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: transparent;
      overflow: hidden;
    }
    
    .toast {
      background: #5558AF;
      color: white;
      border-radius: 4px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 100px;
      width: 350px;
    }
    
    .toast:hover {
      background: #6668BF;
    }
    
    .toast-icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .toast-content {
      flex: 1;
      overflow: hidden;
    }
    
    .toast-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .toast-body {
      font-size: 12px;
      opacity: 0.9;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="toast-icon" id="icon">📞</div>
    <div class="toast-content">
      <div class="toast-title" id="title">Notification</div>
      <div class="toast-body" id="body">Message</div>
    </div>
  </div>
  
  <script>
    document.getElementById('toast').addEventListener('click', () => {
      window.notificationToast.onClick();
    });
  </script>
</body>
</html>
